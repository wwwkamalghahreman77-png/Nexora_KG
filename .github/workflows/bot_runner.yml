name: rail-bot-runner

# این ورک‌فلو ربات رو تا ~۵ ساعت و ۵۰ دقیقه روشن نگه می‌داره (سقف گیت‌هاب ۶
# ساعته)، درست قبل از تموم شدن وقتش خودش یه اجرای بعدی رو صدا می‌زنه تا
# زنجیره‌ی پیوسته بشه. کرون هر ۶ ساعت هم به‌عنوان فال‌بک هست، اگه به هر
# دلیلی زنجیره قطع شد (کرش، مشکل گیت‌هاب و...).

on:
  workflow_dispatch:      # برای روشن کردن دستی اولین بار
  schedule:
    - cron: "0 */6 * * *" # فال‌بک ایمنی

permissions:
  contents: write
  actions: write

concurrency:
  group: rail-bot-runner
  cancel-in-progress: false   # اگه یه اجرا در حاله، صف بشه نه اینکه کشته بشه

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 355   # کمی کمتر از سقف ۶ ساعته گیت‌هاب

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: نصب وابستگی‌ها
        run: pip install -r requirements.txt

      - name: اجرای ربات (تا حداکثر ~۵ساعت و ۵۰ دقیقه)
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          ADMIN_IDS: ${{ secrets.ADMIN_IDS }}
        run: timeout 21000 python -m Bot.Main || true

      - name: ذخیره‌ی تغییرات دیتابیس (پارتنرها/لیدها/داده‌های جدید)
        if: always()
        run: |
          git config user.name "rail-bot"
          git config user.email "actions@users.noreply.github.com"
          git add rail_network.db
          git diff --cached --quiet || git commit -m "بروزرسانی دیتابیس ربات [skip ci]"
          git push || echo "چیزی برای push نبود یا تداخل داشت - مشکلی نیست"

      - name: صدا زدن اجرای بعدی (زنجیره‌ی پیوسته)
        if: always()
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          curl -s -X POST \
            -H "Authorization: token ${GH_PAT}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/bot_runner.yml/dispatches" \
            -d "{\"ref\":\"${{ github.ref_name }}\"}"
